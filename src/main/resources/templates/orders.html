<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Products</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <style>

        .sidebar{
            width:250px;
            min-height:100vh;
        }

        .sidebar a{
            display:block;
            padding:12px;
            text-decoration:none;
            color:white;
            border-radius:8px;
            margin-bottom:8px;
        }

        .sidebar a:hover{
            background:#495057;
        }

    </style>

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->

    <div class="sidebar bg-dark p-3">

        <h3 class="text-white mb-4">
            Admin Panel
        </h3>

        <a th:href="@{/admin/home}">
            Users
        </a>

        <a th:href="@{/admin/products}">
            Products
        </a>

        <a th:href="@{/admin/orders}">
            Orders
        </a>

    </div>


    <!-- MAIN CONTENT -->

    <div class="container-fluid p-0">

        <!-- NAVBAR -->

        <nav class="navbar bg-light shadow-sm px-4">

            <div class="ms-auto">

                <span class="fw-bold me-3"
                      th:text="${admin.username}">

                    Admin

                </span>

                <form
                        th:action="@{/logout}"
                        method="post"
                        class="d-inline">

                    <button class="btn btn-danger"
                            type="submit">

                        Logout

                    </button>

                </form>

            </div>

        </nav>





        <!--orders-->
        <div class="card shadow mb-4">

            <div class="card-body">

                <h4 class="mb-3">
                    Orders
                </h4>

                <table class="table">
                    <thead class="table-dark">
                    <tr>
                        <td>Order id</td>
                        <td>userId</td>
                        <td>total price</td>
                        <td>status</td>
                        <td>create time</td>
                        <td></td>
                    </tr>
                    </thead>
                    <tbody id="orders"> </tbody>
                </table>

                <button class="btn btn-primary" onclick="getOrders()">get orders</button>


            </div>

        </div>



    </div>
</div>
<script>

    window.onload = function () {
        getOrders();
    };
    function getOrders(){
        fetch("/orders/").then(res => res.json()).then(data => render(data)).catch(err => console.log(err))
    }

    function render(data){
        const table  =document.getElementById("orders");
        let temp = ""

        for (let i =0; i< data.length; i++){
            const order = data[i];
            temp += `
<tr>
    <td>${order.id}</td>
    <td>${order.userId}</td>
    <td>${order.totalPrice}</td>

    <td>
        <select id="status-${order.id}">
            <option value="CREATED" ${order.status === 'CREATED' ? 'selected' : ''}>
                CREATED
            </option>

            <option value="CONFIRMED" ${order.status === 'CONFIRMED' ? 'selected' : ''}>
                CONFIRMED
            </option>

            <option value="DELIVERED" ${order.status === 'DELIVERED' ? 'selected' : ''}>
                DELIVERED
            </option>

            <option value="CANCELED" ${order.status === 'CANCELED' ? 'selected' : ''}>
                CANCELED
            </option>
        </select>
    </td>

    <td>${order.createAt}</td>

    <td>
        <button onclick="changeStatus(${order.id})">
            Change status
        </button>
    </td>
    <td >
        <a href="/orders/+${order.id}"
        class="btn btn-info">
               Info
        </a>
    </td>
</tr>`;
            table.innerHTML = temp;
        }
    }

    async function changeStatus(id){

        const st = document.getElementById(`status-${id}`);

        const response = await fetch(`/orders/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                status: st.value
            })
        });

        if(response.ok){
            alert("Updated");
        }else{
            alert("Error");
        }
    }
</script>
</body>

</html>
